<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2FA Verification - eDoc HMS</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <style>
    body {
      background: radial-gradient(100% 100% at 50% 0%, var(--background) 0%, #0c1a2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .verify-card {
      max-width: 420px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .otp-input-container {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }
    .otp-field {
      width: 3rem;
      height: 3.5rem;
      font-size: var(--text-2xl);
      font-weight: 800;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--muted-bg);
      color: var(--foreground);
    }
    .otp-field:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
      background: var(--card);
    }
    .countdown-timer {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--danger);
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="verify-card animate-scaleIn">
    <div style="margin-bottom: 2rem;">
      <div style="color: var(--primary); font-size: 2.5rem; margin-bottom: 0.5rem; display: inline-flex; align-items: center; justify-content: center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h2 class="font-bold">Two-Factor Auth</h2>
      <p class="text-muted mt-1">Please enter the 6-digit code sent to your email</p>
      <div id="emailTarget" style="font-weight: 600; color: var(--foreground); margin-top: 0.25rem; font-size: var(--text-sm);"></div>
    </div>

    <form id="verifyForm">
      <div class="otp-input-container">
        <!-- 6 digits -->
        <input type="text" maxlength="1" class="otp-field" required>
        <input type="text" maxlength="1" class="otp-field" required>
        <input type="text" maxlength="1" class="otp-field" required>
        <input type="text" maxlength="1" class="otp-field" required>
        <input type="text" maxlength="1" class="otp-field" required>
        <input type="text" maxlength="1" class="otp-field" required>
      </div>

      <div class="countdown-timer" id="timerLabel">Expires in: 05:00</div>

      <button type="submit" id="submitBtn" class="btn btn-primary w-full mt-6">
        Verify Security Code
      </button>
    </form>

    <div style="margin-top: 1.5rem;">
      <button id="resendBtn" class="btn btn-secondary btn-sm w-full" disabled>
        Resend Code
      </button>
    </div>

    <div style="text-align: center; margin-top: 1.5rem;">
      <a href="login.html" class="text-sm font-medium text-muted hover:text-primary">
        Cancel & Return to Login
      </a>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    // Grab temporary email
    const email = localStorage.getItem('edoc_temp_2fa_email');
    if (!email) {
      window.location.href = 'login.html';
    }

    document.getElementById('emailTarget').innerText = email;

    // Handle OTP digits cursor focusing
    const fields = document.querySelectorAll('.otp-field');
    fields.forEach((field, index) => {
      field.addEventListener('input', (e) => {
        if (field.value.length > 0 && index < fields.length - 1) {
          fields[index + 1].focus();
        }
      });
      field.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && field.value.length === 0 && index > 0) {
          fields[index - 1].focus();
        }
      });
    });

    // Handle 5 minute timer
    let timeLeft = 300; // seconds
    let timerInterval;

    function startTimer() {
      clearInterval(timerInterval);
      document.getElementById('resendBtn').disabled = true;
      
      timerInterval = setInterval(() => {
        timeLeft--;
        const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const secs = (timeLeft % 60).toString().padStart(2, '0');
        
        document.getElementById('timerLabel').innerText = `Expires in: ${mins}:${secs}`;
        
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          document.getElementById('timerLabel').innerText = 'Code has expired.';
          document.getElementById('resendBtn').disabled = false;
        }
      }, 1000);
    }

    startTimer();

    // Verify submission handler
    const form = document.getElementById('verifyForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      let otpCode = '';
      fields.forEach(field => {
        otpCode += field.value;
      });

      submitBtn.disabled = true;
      submitBtn.innerText = 'Verifying...';

      try {
        const response = await API.post('/auth/verify-otp/', { email, otp_code: otpCode });
        
        if (response.success) {
          localStorage.removeItem('edoc_temp_2fa_email');
          Auth.saveSession(response.data);
          Utils.showToast('Security verification successful!', 'success');
          
          setTimeout(() => {
            Auth.redirectToDashboard(response.data.user.role);
          }, 1000);
        } else {
          Utils.showToast(response.message || 'Verification failed', 'danger');
        }
      } catch (err) {
        Utils.showToast(err.message || 'An error occurred', 'danger');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Verify Security Code';
      }
    });

    // Resend handler
    const resendBtn = document.getElementById('resendBtn');
    resendBtn.addEventListener('click', async () => {
      resendBtn.disabled = true;
      try {
        const response = await API.post('/auth/resend-otp/', { email });
        if (response.success) {
          Utils.showToast('New verification code sent!', 'success');
          timeLeft = 300;
          startTimer();
        } else {
          Utils.showToast(response.message || 'Failed to resend code', 'danger');
          resendBtn.disabled = false;
        }
      } catch (err) {
        Utils.showToast(err.message || 'An error occurred', 'danger');
        resendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
