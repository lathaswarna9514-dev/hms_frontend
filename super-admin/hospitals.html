<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provision Hospitals - eDoc HMS</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

  <!-- Layout Wrapper -->
  <div class="layout-container">
    <!-- Sidebar -->
    <aside class="sidebar"></aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Header is rendered by JS -->

      <!-- Content wrapper -->
      <div class="content-wrapper">
        
        <!-- Action bar -->
        <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
          <div>
            <h2 class="font-bold">Hospital Node Provisioning</h2>
            <p class="text-muted mt-1">Manage active tenant systems and provision new hospital nodes.</p>
          </div>
          <button class="btn btn-primary" onclick="openProvisionModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Provision Hospital
          </button>
        </div>

        <!-- Hospitals Table -->
        <div class="card">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Node ID</th>
                  <th>Hospital Details</th>
                  <th>Contact Info</th>
                  <th>Address</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="hospitalsTableBody">
                <tr>
                  <td colspan="6" class="text-center text-muted py-4">Fetching hospitals...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Provision Modal -->
  <div id="provisionModal" class="modal">
    <div class="modal-content" style="max-width: 550px;">
      <div class="modal-header">
        <h4 class="font-bold" id="modalTitle">Provision New Hospital</h4>
        <button class="btn btn-sm" onclick="closeProvisionModal()">&times;</button>
      </div>
      <form id="provisionForm" onsubmit="handleFormSubmit(event)">
        <input type="hidden" id="hospitalId">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="hospitalName">Hospital Name</label>
            <input type="text" id="hospitalName" class="form-input" placeholder="e.g. Metro General Hospital" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="hospitalEmail">System Email</label>
            <input type="email" id="hospitalEmail" class="form-input" placeholder="e.g. admin@metrogeneral.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="hospitalPhone">Contact Number</label>
            <input type="tel" id="hospitalPhone" class="form-input" placeholder="e.g. +91 98765 43210" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="hospitalAddress">Physical Address</label>
            <textarea id="hospitalAddress" class="form-input" placeholder="e.g. Plot 45, Tech Corridor, Bangalore" rows="3" required></textarea>
          </div>
          <div class="form-group flex items-center" style="gap: 0.5rem; margin-top: 1rem;">
            <input type="checkbox" id="hospitalActive" checked>
            <label class="form-label" for="hospitalActive" style="margin-bottom: 0; cursor: pointer;">Enable immediately upon provisioning</label>
          </div>
        </div>
        <div class="modal-footer flex justify-end" style="gap: 0.75rem;">
          <button type="button" class="btn btn-secondary" onclick="closeProvisionModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">Provision Node</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard(['super-admin']);

    const superAdminMenu = [
      {
        label: 'Dashboard Overview',
        path: '../super-admin/dashboard.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>'
      },
      {
        label: 'Analytics',
        path: '../super-admin/analytics.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>'
      },
      {
        label: 'Platform Admins',
        path: '../super-admin/admins.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>'
      },
      {
        label: 'Provision Hospitals',
        path: '../super-admin/hospitals.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'
      },
      {
        label: 'Doctors',
        path: '../super-admin/doctors.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>'
      },
      {
        label: 'Patients',
        path: '../super-admin/patients.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>'
      },
      {
        label: 'Staff Directory',
        path: '../super-admin/nurses.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',
        subItems: [
          { label: 'Nurses', path: '../super-admin/nurses.html' },
          { label: 'Front Desk', path: '../super-admin/frontdesk.html' },
          { label: 'Laboratory', path: '../super-admin/lab.html' },
          { label: 'Pharmacy', path: '../super-admin/pharmacy.html' }
        ]
      },
      {
        label: 'Support Tickets',
        path: '../super-admin/tickets.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>'
      },
      {
        label: 'Platform Settings',
        path: '../super-admin/settings.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>'
      }
    ];

    Utils.renderSidebar(superAdminMenu, '../super-admin/hospitals.html', 'eDoc Console', 'Global platform');
    Utils.renderHeader('Hospital Provisioning');

    let allHospitals = [];

    // Load Hospitals
    async function loadHospitals() {
      try {
        const response = await API.get('/hospitals/');
        allHospitals = response.data.results || response.data || [];
        renderTable();
      } catch (err) {
        Utils.showToast('Failed to load provisioned hospitals', 'danger');
      }
    }

    function renderTable() {
      const tbody = document.getElementById('hospitalsTableBody');
      if (allHospitals.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">No hospitals found. Click Provision to create one.</td></tr>`;
        return;
      }

      tbody.innerHTML = allHospitals.map(h => `
        <tr>
          <td><span class="font-mono text-sm">${h.id}</span></td>
          <td><strong>${h.name}</strong></td>
          <td>
            <div class="text-sm font-semibold">${h.email}</div>
            <div class="text-xs text-muted">${h.phone}</div>
          </td>
          <td><span class="text-sm text-muted">${h.address}</span></td>
          <td>
            <span class="badge ${h.is_active ? 'badge-success' : 'badge-danger'}">
              ${h.is_active ? 'Active' : 'Suspended'}
            </span>
          </td>
          <td>
            <div class="flex gap-2">
              <button class="btn btn-secondary btn-sm" onclick="editHospital(${h.id})">Edit</button>
              <button class="btn btn-sm ${h.is_active ? 'btn-danger' : 'btn-success'}" onclick="toggleHospitalStatus(${h.id}, ${h.is_active})">
                ${h.is_active ? 'Suspend' : 'Activate'}
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // Modal Control
    function openProvisionModal() {
      document.getElementById('provisionForm').reset();
      document.getElementById('hospitalId').value = '';
      document.getElementById('modalTitle').innerText = 'Provision New Hospital';
      document.getElementById('submitBtn').innerText = 'Provision Node';
      document.getElementById('provisionModal').classList.add('active');
    }

    function closeProvisionModal() {
      document.getElementById('provisionModal').classList.remove('active');
    }

    function editHospital(id) {
      const h = allHospitals.find(item => item.id === id);
      if (!h) return;

      document.getElementById('hospitalId').value = h.id;
      document.getElementById('hospitalName').value = h.name;
      document.getElementById('hospitalEmail').value = h.email;
      document.getElementById('hospitalPhone').value = h.phone;
      document.getElementById('hospitalAddress').value = h.address;
      document.getElementById('hospitalActive').checked = h.is_active;

      document.getElementById('modalTitle').innerText = 'Edit Hospital Details';
      document.getElementById('submitBtn').innerText = 'Save Changes';
      document.getElementById('provisionModal').classList.add('active');
    }

    // Save or Update Hospital
    async function handleFormSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('hospitalId').value;
      const payload = {
        name: document.getElementById('hospitalName').value,
        email: document.getElementById('hospitalEmail').value,
        phone: document.getElementById('hospitalPhone').value,
        address: document.getElementById('hospitalAddress').value,
        is_active: document.getElementById('hospitalActive').checked
      };

      try {
        if (id) {
          // Edit Mode
          await API.put(`/hospitals/${id}/`, payload);
          Utils.showToast('Hospital configuration updated successfully', 'success');
        } else {
          // Provision Mode
          await API.post('/hospitals/', payload);
          Utils.showToast('New hospital node provisioned successfully', 'success');
        }
        closeProvisionModal();
        loadHospitals();
      } catch (err) {
        Utils.showToast(err.message || 'Error processing hospital configurations', 'danger');
      }
    }

    // Toggle hospital status (Suspend/Activate)
    async function toggleHospitalStatus(id, currentStatus) {
      const confirmMsg = currentStatus 
        ? 'Are you sure you want to suspend this hospital? All tenant connections will be temporarily suspended.'
        : 'Re-activate this hospital node?';

      if (!confirm(confirmMsg)) return;

      try {
        await API.patch(`/hospitals/${id}/`, { is_active: !currentStatus });
        Utils.showToast(currentStatus ? 'Hospital suspended' : 'Hospital activated', 'success');
        loadHospitals();
      } catch (err) {
        Utils.showToast('Failed to toggle status', 'danger');
      }
    }

    loadHospitals();
  </script>
</body>
</html>
