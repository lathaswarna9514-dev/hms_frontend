<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provision Staff - eDoc HMS</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

  <!-- Layout Wrapper -->
  <div class="layout-container">
    <!-- Sidebar -->
    <aside class="sidebar"></aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Header is rendered by JS -->

      <!-- Content wrapper -->
      <div class="content-wrapper">
        
        <div class="card" style="max-width: 600px; margin: 0 auto;">
          <div class="card-header">
            <h4 class="card-title">Provision Staff & Credentials</h4>
          </div>
          <div class="card-body">
            <form id="createStaffForm">
              
              <div class="form-group">
                <label class="form-label">Select Hospital</label>
                <select id="hospital" class="form-control" required>
                  <option value="">Loading hospitals...</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Role</label>
                <select id="usertype" class="form-control" required>
                  <option value="hospital-admin">Hospital Admin</option>
                  <option value="doctor">Doctor</option>
                  <option value="nurse">Nurse</option>
                  <option value="pharmacy">Pharmacy</option>
                  <option value="lab">Lab Technician</option>
                  <option value="frontdesk">Frontdesk</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="name" class="form-control" required placeholder="John Doe">
              </div>
              <div class="form-group">
                <label class="form-label">Email (Username)</label>
                <input type="email" id="email" class="form-control" required placeholder="user@hospital.com">
              </div>
              <div class="form-group">
                <label class="form-label">Password</label>
                <div style="position: relative;">
<input type="password" id="password" class="form-control" required placeholder="Secure password" style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
              </div>
              
              <div class="flex justify-end gap-3 mt-6">
                <button type="button" class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
                <button type="submit" class="btn btn-primary">Create Credential</button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard(['super-admin']);

    const superAdminMenu = [
      {
        label: 'Dashboard Overview',
        path: '../super-admin/dashboard.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>'
      },
      {
        label: 'Analytics',
        path: '../super-admin/analytics.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>'
      },
      {
        label: 'Platform Admins',
        path: '../super-admin/admins.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>'
      },
      {
        label: 'Provision Hospitals',
        path: '../super-admin/hospitals.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'
      },
      {
        label: 'Doctors',
        path: '../super-admin/doctors.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>'
      },
      {
        label: 'Patients',
        path: '../super-admin/patients.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>'
      },
      {
        label: 'Staff Directory',
        path: '../super-admin/nurses.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',
        subItems: [
          { label: 'Nurses', path: '../super-admin/nurses.html' },
          { label: 'Front Desk', path: '../super-admin/frontdesk.html' },
          { label: 'Laboratory', path: '../super-admin/lab.html' },
          { label: 'Pharmacy', path: '../super-admin/pharmacy.html' }
        ]
      },
      {
        label: 'Support Tickets',
        path: '../super-admin/tickets.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>'
      },
      {
        label: 'Platform Settings',
        path: '../super-admin/settings.html',
        iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>'
      }
    ];

    Utils.renderSidebar(superAdminMenu, '../super-admin/create-staff.html', 'eDoc Console', 'Global platform');
    Utils.renderHeader('Provision Staff');

    // Load hospitals
    async function loadHospitals() {
      try {
        const res = await API.get('/hospitals/');
        const select = document.getElementById('hospital');
        if (res.results) {
          select.innerHTML = '<option value="">Select a hospital...</option>' + 
            res.results.map(h => `<option value="${h.id}">${h.name}</option>`).join('');
        }
      } catch (err) {
        console.error(err);
      }
    }
    loadHospitals();

    document.getElementById('createStaffForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        hospital: document.getElementById('hospital').value,
        usertype: document.getElementById('usertype').value,
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        is_active: true
      };

      try {
        const response = await API.post('/auth/super-admin/staff/', payload);
        if (response.id) {
          Utils.showToast('Staff credential created successfully.', 'success');
          document.getElementById('createStaffForm').reset();
        } else if (response.email) {
           Utils.showToast('Email already exists or invalid.', 'danger');
        } else {
           Utils.showToast(response.message || 'Error creating staff', 'danger');
        }
      } catch (err) {
        Utils.showToast(err.message || 'Error creating staff', 'danger');
      }
    });
  </script>
</body>
</html>
