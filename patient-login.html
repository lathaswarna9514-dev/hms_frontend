<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/animations.css">  
    <link rel="stylesheet" href="css/main.css">  
    <link rel="stylesheet" href="css/login.css">
    <title>Patient Login</title>
</head>
<body>
    <center>
    <div class="container">
        <table border="0" style="margin: 0;padding: 0;width: 60%;">
            <tr>
                <td>
                    <p class="header-text">Patient Login</p>
                </td>
            </tr>
            <tr>
                <td>
                    <p class="sub-text">Welcome back! Please login to your Patient account</p>
                </td>
            </tr>
            <form id="loginForm">
                <tr>
                    <td class="label-td">
                        <label for="useremail" class="form-label">Email: </label>
                    </td>
                </tr>
                <tr>
                    <td class="label-td">
                        <input type="email" id="useremail" name="useremail" class="input-text" placeholder="Email Address" required autocomplete="username">
                    </td>
                </tr>
                <tr>
                    <td class="label-td">
                        <label for="userpassword" class="form-label">Password: </label>
                    </td>
                </tr>
                <tr>
                    <td class="label-td">
                        <div style="position: relative;">
<input type="password" id="userpassword" name="userpassword" class="input-text" placeholder="Password" required autocomplete="current-password" style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <br>
                        <div id="errorMessage" style="color:rgb(255, 62, 62); text-align:center; font-size:14px; font-weight:500;"></div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="submit" value="Login" class="login-btn btn-primary btn">
                    </td>
                </tr>
            </form>
            <tr>
                <td>
                    <br>
                    <label for="" class="sub-text" style="font-weight: 280;">Don't have an account? </label>
                    <a href="patient-signup.html" class="hover-link1 non-style-link">Sign Up</a>
                    <br>
                    <a href="index.html" class="hover-link1 non-style-link" style="font-size: 13px; display: inline-block; margin-top: 10px;">&larr; Back to Landing Page</a>
                    <br><br><br>
                </td>
            </tr>
        </table>
    </div>
    </center>

    <script type="module">
        import { ApiService } from './services/api.js';

        // Check if already authenticated
        if (ApiService.auth.isAuthenticated()) {
            const user = ApiService.auth.getUser();
            if (user && user.usertype === 'p') {
                window.location.href = 'patient/index.html';
            }
        }

        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.textContent = '';

            const email = document.getElementById('useremail').value.trim();
            const password = document.getElementById('userpassword').value;

            try {
                const data = await ApiService.auth.login(email, password);
                if (data.user.usertype === 'p') {
                    window.location.href = 'patient/index.html';
                } else {
                    // Log out immediately if not patient
                    await ApiService.auth.logout();
                    errorDiv.textContent = 'Access Denied: This portal is for patients only.';
                }
            } catch (err) {
                console.error("Login failed:", err);
                errorDiv.textContent = err.message || 'Invalid credentials or server error.';
            }
        });
    </script>

    <script src="assets/js/utils.js"></script>
</body>
</html>
