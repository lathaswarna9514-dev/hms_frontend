<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Schedules - eDoc HMS</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

  <div class="layout-container">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <div class="content-wrapper">

        <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
          <div>
            <h2 class="font-bold">My Consultation Schedules</h2>
            <p class="text-muted mt-1">Create and manage your consultation session slots.</p>
          </div>
          <button class="btn btn-primary" onclick="openModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:0.5rem"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Session
          </button>
        </div>

        <!-- Filters -->
        <div class="flex gap-3 mb-5">
          <select id="filterStatus" class="form-input" style="max-width:200px;" onchange="loadSchedules()">
            <option value="upcoming">Upcoming Only</option>
            <option value="all">All Sessions</option>
          </select>
        </div>

        <div class="card">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Session Title</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Booked / Max</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="schedulesBody">
                <tr><td colspan="6" class="text-center text-muted py-4">Loading your schedules...</td></tr>
              </tbody>
            </table>
          </div>
          <div id="paginationContainer"></div>
        </div>

      </div>
    </main>
  </div>

  <!-- Create Session Modal -->
  <div id="sessionModal" class="modal">
    <div class="modal-content" style="max-width:500px;">
      <div class="modal-header">
        <h4 class="font-bold">Create Consultation Session</h4>
        <button class="btn btn-sm" onclick="closeModal()">&times;</button>
      </div>
      <form id="sessionForm" onsubmit="handleSubmit(event)">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="sessTitle">Session Title</label>
            <input type="text" id="sessTitle" class="form-input" placeholder="e.g. Morning OPD, Cardiology Clinic" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="sessDate">Date</label>
            <input type="date" id="sessDate" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="sessTime">Start Time</label>
            <input type="time" id="sessTime" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="sessMax">Max Patients</label>
            <input type="number" id="sessMax" class="form-input" min="1" max="200" value="20" required>
          </div>
        </div>
        <div class="modal-footer flex justify-end" style="gap:.75rem;">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Session</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard(['doctor']);

    const doctorMenu = [
      { label: 'My Dashboard', path: '../doctor/dashboard.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>' },
      { label: 'My Schedules', path: '../doctor/schedules.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' },
      { label: 'My Patients', path: '../doctor/appointments.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>' },
      { label: 'My Leaves', path: '../doctor/leaves.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>' },
      { label: 'Prescriptions', path: '../doctor/prescription.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>' },
      { label: 'My Profile', path: '../doctor/profile.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' }
    ];

    Utils.renderSidebar(doctorMenu, '../doctor/schedules.html', 'Doctor Console', 'Clinical Portal');
    Utils.renderHeader('My Schedules');

    let schedules = [];
    let currentPage = 1;
    let currentPage = 1;

    async function loadSchedules() {
      const upcoming = document.getElementById('filterStatus').value === 'upcoming' ? '&upcoming=true' : '';
      const tbody = document.getElementById('schedulesBody');
      try {
        // Use my schedules endpoint for accurate personal filtering
        const myRes = await API.get('/schedules/my/');
        schedules = myRes.data || [];
        if (document.getElementById('filterStatus').value === 'upcoming') {
          const today = new Date().toISOString().split('T')[0];
          schedules = schedules.filter(s => s.schedule_date >= today);
        }
        renderTable();
        Utils.renderPagination('paginationContainer', totalCount, currentPage, 15, (newPage) => {
          currentPage = newPage;
          loadSchedules();
        });
        Utils.renderPagination('paginationContainer', totalCount, currentPage, 15, (newPage) => {
          currentPage = newPage;
          loadSchedules();
        });
      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">No sessions found. Click New Session to create one.</td></tr>`;
        Utils.showToast('Failed to load schedules', 'danger');
      }
    }

    function renderTable() {
      const tbody = document.getElementById('schedulesBody');
      if (schedules.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">No sessions found. Click New Session to create one.</td></tr>`;
        return;
      }
      tbody.innerHTML = schedules.map(s => {
        const isFull = s.booked_count >= s.max_patients;
        return `
          <tr>
            <td><strong>${s.title}</strong></td>
            <td>${s.schedule_date}</td>
            <td>${s.schedule_time}</td>
            <td>${s.booked_count} / ${s.max_patients}</td>
            <td><span class="badge ${isFull ? 'badge-danger' : 'badge-success'}">${isFull ? 'Full' : 'Open'}</span></td>
            <td>
              <div class="flex gap-2">
                <a href="../doctor/appointments.html?schedule=${s.id}" class="btn btn-secondary btn-sm">View Patients</a>
                <button class="btn btn-danger btn-sm" onclick="deleteSession(${s.id})">Delete</button>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    function openModal() {
      // Default date to today
      document.getElementById('sessDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('sessionModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('sessionModal').classList.remove('active');
      document.getElementById('sessionForm').reset();
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const user = Auth.getUser();
      const payload = {
        title: document.getElementById('sessTitle').value,
        schedule_date: document.getElementById('sessDate').value,
        schedule_time: document.getElementById('sessTime').value,
        max_patients: parseInt(document.getElementById('sessMax').value),
        doctor: user.doctor_id  // will be resolved server-side via token
      };

      try {
        await API.post('/schedules/', payload);
        Utils.showToast('Session created successfully', 'success');
        closeModal();
        loadSchedules();
      } catch (err) {
        Utils.showToast(err.message || 'Failed to create session', 'danger');
      }
    }

    async function deleteSession(id) {
      if (!confirm('Delete this consultation session? All associated bookings will be removed.')) return;
      try {
        await API.delete(`/schedules/${id}/`);
        Utils.showToast('Session deleted', 'success');
        loadSchedules();
      } catch (err) {
        Utils.showToast('Failed to delete session', 'danger');
      }
    }

    loadSchedules();
  </script>
</body>
</html>
