<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Patients - eDoc HMS</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

  <div class="layout-container">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <div class="content-wrapper">

        <div style="margin-bottom: 2rem;">
          <h2 class="font-bold">My Patients</h2>
          <p class="text-muted mt-1">View all patients booked across your consultation sessions.</p>
        </div>

        <!-- Session Filter -->
        <div class="flex gap-3 mb-5">
          <select id="sessionFilter" class="form-input" style="max-width:320px;" onchange="loadAppointments()">
            <option value="">All Sessions</option>
          </select>
        </div>

        <div class="card">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Appt #</th>
                  <th>Patient Name</th>
                  <th>Session</th>
                  <th>Scheduled Date</th>
                  <th>Booked At</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="appointmentsBody">
                <tr><td colspan="6" class="text-center text-muted py-4">Loading patient appointments...</td></tr>
              </tbody>
            </table>
          </div>
          <div id="paginationContainer"></div>
        </div>

      </div>
    </main>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard(['doctor']);

    const doctorMenu = [
      { label: 'My Dashboard', path: '../doctor/dashboard.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>' },
      { label: 'My Schedules', path: '../doctor/schedules.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' },
      { label: 'My Patients', path: '../doctor/appointments.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>' },
      { label: 'My Leaves', path: '../doctor/leaves.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>' },
      { label: 'Prescriptions', path: '../doctor/prescription.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>' },
      { label: 'My Profile', path: '../doctor/profile.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' }
    ];

    Utils.renderSidebar(doctorMenu, '../doctor/appointments.html', 'Doctor Console', 'Clinical Portal');
    Utils.renderHeader('My Patients');

    let mySessions = [];
    let currentPage = 1;

    async function init() {
      try {
        const res = await API.get('/schedules/my/');
        mySessions = res.data || [];
        const select = document.getElementById('sessionFilter');
        mySessions.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.text = `${s.title} — ${s.schedule_date}`;
          select.appendChild(opt);
        });

        select.addEventListener('change', () => {
          currentPage = 1;
        });

        // Check URL query for pre-selected schedule
        const urlParams = new URLSearchParams(window.location.search);
        const scheduleId = urlParams.get('schedule');
        if (scheduleId) select.value = scheduleId;

        loadAppointments();
      } catch (err) {
        Utils.showToast('Failed to load sessions', 'danger');
      }
    }

    async function loadAppointments() {
      const scheduleId = document.getElementById('sessionFilter').value;
      const tbody = document.getElementById('appointmentsBody');
      const pagContainer = document.getElementById('paginationContainer');
      try {
        let appointments = [];
        if (scheduleId) {
          // Load specific session's patient list
          const res = await API.get(`/schedules/${scheduleId}/`);
          appointments = res.data.booked_patients || [];
          renderTable(appointments, scheduleId);
          if (pagContainer) pagContainer.innerHTML = '';
        } else {
          // Load from all sessions via appointments endpoint (paginated)
          const res = await API.get(`/appointments/doctor/?page=${currentPage}`);
          appointments = res.data.results || res.data || [];
          const totalCount = res.data.count !== undefined ? res.data.count : appointments.length;
          renderTableFull(appointments);
          Utils.renderPagination('paginationContainer', totalCount, currentPage, 15, (newPage) => {
            currentPage = newPage;
            loadAppointments();
          });
        }
      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">No patient appointments found.</td></tr>`;
        Utils.showToast('Failed to load appointments', 'danger');
      }
    }

    function renderTable(patients, scheduleId) {
      const session = mySessions.find(s => s.id == scheduleId);
      const tbody = document.getElementById('appointmentsBody');
      if (!patients || patients.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">No patients booked for this session.</td></tr>`;
        return;
      }
      tbody.innerHTML = patients.map(p => `
        <tr>
          <td><span class="badge badge-secondary">#${p.appointment_number}</span></td>
          <td><strong>${p.patient_name}</strong></td>
          <td>${session ? session.title : '—'}</td>
          <td>${session ? session.schedule_date : '—'}</td>
          <td><span class="text-xs text-muted">${p.booked_at ? new Date(p.booked_at).toLocaleString() : '—'}</span></td>
          <td>
            <a href="../doctor/prescription.html?patient=${p.patient_id}&appointment=${p.id}" class="btn btn-primary btn-sm">Prescribe</a>
          </td>
        </tr>`).join('');
    }

    function renderTableFull(appointments) {
      const tbody = document.getElementById('appointmentsBody');
      if (appointments.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">No patient appointments found.</td></tr>`;
        return;
      }
      tbody.innerHTML = appointments.map(a => `
        <tr>
          <td><span class="badge badge-secondary">#${a.appointment_number}</span></td>
          <td><strong>${a.patient_name}</strong></td>
          <td>${a.session_title}</td>
          <td>${a.schedule_date}</td>
          <td><span class="text-xs text-muted">${a.booked_at ? new Date(a.booked_at).toLocaleString() : '—'}</span></td>
          <td>
            <a href="../doctor/prescription.html?patient=${a.patient}&appointment=${a.id}" class="btn btn-primary btn-sm">Prescribe</a>
          </td>
        </tr>`).join('');
    }

    init();
  </script>
</body>
</html>
