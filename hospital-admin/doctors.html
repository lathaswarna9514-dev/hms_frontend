<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Doctor Accounts - eDoc HMS</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

  <!-- Layout Wrapper -->
  <div class="layout-container">
    <!-- Sidebar -->
    <aside class="sidebar"></aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Header is rendered by JS -->

      <!-- Content wrapper -->
      <div class="content-wrapper">
        
        <!-- Action bar -->
        <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
          <div>
            <h2 class="font-bold">Doctor Accounts Registry</h2>
            <p class="text-muted mt-1">Manage doctor profiles, specialists assignment, and authentication credentials.</p>
          </div>
          <button class="btn btn-primary" onclick="openDoctorModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Doctor
          </button>
        </div>

        <!-- Search / Filter Bar -->
        <div class="card mb-6 flex justify-between items-center" style="gap: 1rem; padding: 1rem;">
          <input type="text" id="doctorSearch" class="form-input" placeholder="Search by name or email..." style="max-width: 350px;" oninput="debounceSearch()">
        </div>

        <!-- Doctor Table -->
        <div class="card">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Doctor Details</th>
                  <th>Specialty</th>
                  <th>NIC</th>
                  <th>Telephone</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="doctorsTableBody">
                <tr>
                  <td colspan="5" class="text-center text-muted py-4">Fetching doctor profiles...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Add/Edit Doctor Modal -->
  <div id="doctorModal" class="modal">
    <div class="modal-content" style="max-width: 550px;">
      <div class="modal-header">
        <h4 class="font-bold" id="modalTitle">Register Doctor Account</h4>
        <button class="btn btn-sm" onclick="closeDoctorModal()">&times;</button>
      </div>
      <form id="doctorForm" onsubmit="handleFormSubmit(event)">
        <input type="hidden" id="doctorId">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="docName">Full Name</label>
            <input type="text" id="docName" class="form-input" placeholder="e.g. Dr. John Doe" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="docEmail">Login Email</label>
            <input type="email" id="docEmail" class="form-input" placeholder="e.g. johndoe@hospital.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="docNic">NIC / ID Card Number</label>
            <input type="text" id="docNic" class="form-input" placeholder="e.g. 987654321V">
          </div>
          <div class="form-group">
            <label class="form-label" for="docPhone">Telephone Contact</label>
            <input type="tel" id="docPhone" class="form-input" placeholder="e.g. +91 98765 12345">
          </div>
          <div class="form-group">
            <label class="form-label" for="docSpecialty">Medical Specialty</label>
            <select id="docSpecialty" class="form-input" required>
              <option value="">Select Specialty...</option>
            </select>
          </div>
          <div class="form-group" id="pwdGroup">
            <label class="form-label" for="docPassword">Account Password</label>
            <div style="position: relative;">
<input type="password" id="docPassword" class="form-input" placeholder="Min 6 characters" required style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
          </div>
          <div class="form-group" id="confirmPwdGroup">
            <label class="form-label" for="docConfirmPassword">Confirm Password</label>
            <div style="position: relative;">
<input type="password" id="docConfirmPassword" class="form-input" placeholder="Re-type password" required style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
          </div>
        </div>
        <div class="modal-footer flex justify-end" style="gap: 0.75rem;">
          <button type="button" class="btn btn-secondary" onclick="closeDoctorModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">Register Doctor</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard(['hospital-admin']);

    const adminMenu = [
      { label: 'Dashboard Overview', path: '../hospital-admin/dashboard.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>' },
      { label: 'Departments', path: '../hospital-admin/departments.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' },
      { label: 'Rooms & Bed Ward', path: '../hospital-admin/rooms-beds.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9zm0 0V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4M9 3v6m6-6v6"/></svg>' },
      { label: 'Doctor Accounts', path: '../hospital-admin/doctors.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>' },
      { label: 'Nurse Accounts', path: '../hospital-admin/nurses.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>' },
      { label: 'Front Desk Desk', path: '../hospital-admin/frontdesk.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' },
      { label: 'Pharmacy Accounts', path: '../hospital-admin/pharma.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>' },
      { label: 'Laboratory Accounts', path: '../hospital-admin/lab.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.31L3.89 17.5c-.77.92-.11 2.5 1.09 2.5h14.04c1.2 0 1.86-1.58 1.09-2.5L14 9.31V2h-4z"/></svg>' },
      { label: 'Staff Attendance', path: '../hospital-admin/attendance.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>' },
      { label: 'Configure Shifts', path: '../hospital-admin/shifts.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' },
      { label: 'Leave Requests', path: '../hospital-admin/leaves.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>' },
      { label: 'Patient Registry', path: '../hospital-admin/patients.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>' },
      { label: 'Appointments', path: '../hospital-admin/appointments.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' },
      { label: 'Billing & Invoices', path: '../hospital-admin/billing.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>' },
      { label: 'Hospital Settings', path: '../hospital-admin/settings.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>' }
    ];

    Utils.renderSidebar(adminMenu, '../hospital-admin/doctors.html', 'eDoc Tenant', 'Hospital Portal');
    Utils.renderHeader('Doctor Profiles');

    let doctors = [];
    let specialties = [];
    let searchTimeout = null;

    async function initPage() {
      try {
        const [specData, docResponse] = await Promise.all([
          API.get('/doctors/specialties/'),
          API.get('/doctors/')
        ]);
        
        specialties = specData.data || [];
        doctors = docResponse.data.results || docResponse.data || [];

        populateSpecialtiesSelect();
        renderTable();
      } catch (err) {
        Utils.showToast('Failed to initialize doctor profiles directory', 'danger');
      }
    }

    function populateSpecialtiesSelect() {
      const select = document.getElementById('docSpecialty');
      select.innerHTML = '<option value="">Select Specialty...</option>' + specialties.map(s => `
        <option value="${s.id}">${s.name}</option>
      `).join('');
    }

    function renderTable() {
      const tbody = document.getElementById('doctorsTableBody');
      if (doctors.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No doctors found matching criteria.</td></tr>`;
        return;
      }

      tbody.innerHTML = doctors.map(d => `
        <tr>
          <td>
            <strong>Dr. ${d.name}</strong><br>
            <span class="text-xs text-muted">${d.email}</span>
          </td>
          <td><span class="badge badge-secondary">${d.specialty_name || 'General Practitioner'}</span></td>
          <td><span class="text-sm font-mono">${d.nic || '--'}</span></td>
          <td><span class="text-sm">${d.telephone || '--'}</span></td>
          <td>
            <div class="flex gap-2">
              <button class="btn btn-secondary btn-sm" onclick="editDoctor(${d.id})">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteDoctor(${d.id})">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function debounceSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(async () => {
        const query = document.getElementById('doctorSearch').value;
        try {
          const response = await API.get(`/doctors/?search=${encodeURIComponent(query)}`);
          doctors = response.data.results || response.data || [];
          renderTable();
        } catch (err) {
          Utils.showToast('Search query failed', 'danger');
        }
      }, 300);
    }

    // Modal control
    function openDoctorModal() {
      document.getElementById('doctorForm').reset();
      document.getElementById('doctorId').value = '';
      document.getElementById('modalTitle').innerText = 'Register Doctor Account';
      document.getElementById('pwdGroup').style.display = 'block';
      document.getElementById('confirmPwdGroup').style.display = 'block';
      document.getElementById('docPassword').required = true;
      document.getElementById('docConfirmPassword').required = true;
      document.getElementById('submitBtn').innerText = 'Register Doctor';
      document.getElementById('doctorModal').classList.add('active');
    }

    function closeDoctorModal() {
      document.getElementById('doctorModal').classList.remove('active');
    }

    async function editDoctor(id) {
      try {
        const response = await API.get(`/doctors/${id}/`);
        if (response.success) {
          const d = response.data;
          document.getElementById('doctorId').value = d.id;
          document.getElementById('docName').value = d.name;
          document.getElementById('docEmail').value = d.email;
          document.getElementById('docNic').value = d.nic || '';
          document.getElementById('docPhone').value = d.telephone || '';
          document.getElementById('docSpecialty').value = d.specialty || '';

          // Password updates are optional during edits
          document.getElementById('pwdGroup').style.display = 'none';
          document.getElementById('confirmPwdGroup').style.display = 'none';
          document.getElementById('docPassword').required = false;
          document.getElementById('docConfirmPassword').required = false;

          document.getElementById('modalTitle').innerText = 'Edit Doctor Profile';
          document.getElementById('submitBtn').innerText = 'Save Changes';
          document.getElementById('doctorModal').classList.add('active');
        }
      } catch (err) {
        Utils.showToast('Failed to fetch doctor details', 'danger');
      }
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('doctorId').value;
      const payload = {
        name: document.getElementById('docName').value,
        email: document.getElementById('docEmail').value,
        nic: document.getElementById('docNic').value,
        telephone: document.getElementById('docPhone').value,
        specialty: document.getElementById('docSpecialty').value
      };

      if (!id) {
        // Register Mode requires passwords
        payload.password = document.getElementById('docPassword').value;
        payload.confirm_password = document.getElementById('docConfirmPassword').value;
      }

      try {
        if (id) {
          await API.put(`/doctors/${id}/`, payload);
          Utils.showToast('Doctor profile updated successfully', 'success');
        } else {
          await API.post('/doctors/', payload);
          Utils.showToast('New doctor profile provisioned successfully', 'success');
        }
        closeDoctorModal();
        initPage();
      } catch (err) {
        Utils.showToast(err.message || 'Error processing doctor accounts registry', 'danger');
      }
    }

    async function deleteDoctor(id) {
      if (!confirm('Are you sure you want to delete this doctor account? Linked scheduling calendars and consult parameters will be cleared.')) return;
      try {
        await API.delete(`/doctors/${id}/`);
        Utils.showToast('Doctor deleted', 'success');
        initPage();
      } catch (err) {
        Utils.showToast('Failed to delete doctor account', 'danger');
      }
    }

    initPage();
  </script>
</body>
</html>
