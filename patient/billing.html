<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bills - eDoc HMS</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
      .bill-card {
        border-left: 4px solid #667eea;
        background: #f8fafc;
        padding: 1.5rem;
        margin-bottom: 1rem;
        border-radius: 6px;
      }

      .bill-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .bill-amount { font-size: 1.5rem; font-weight: 700; color: #1e293b; }

      .status-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .status-paid { background-color: #d1fae5; color: #065f46; }
      .status-pending { background-color: #fef3c7; color: #92400e; }
      .status-overdue { background-color: #fee2e2; color: #991b1b; }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .stat-box {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 1.5rem;
        border-radius: 8px;
        text-align: center;
      }

      .stat-value { font-size: 1.75rem; font-weight: 700; }
      .stat-label { font-size: 12px; opacity: 0.9; margin-top: 0.5rem; }
    </style>
</head>
<body>

  <div class="layout-container">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <div class="content-wrapper">
        
        <div style="margin-bottom: 2rem;">
          <h1 style="font-size: 1.75rem; font-weight: 700; margin: 0;">My Bills & Statements</h1>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="total-amount">$0.00</div>
            <div class="stat-label">Total Bills</div>
          </div>
          <div class="stat-box" style="background: linear-gradient(135deg, #5cb85c 0%, #419641 100%);">
            <div class="stat-value" id="paid-amount">$0.00</div>
            <div class="stat-label">Paid</div>
          </div>
          <div class="stat-box" style="background: linear-gradient(135deg, #f0ad4e 0%, #f08f00 100%);">
            <div class="stat-value" id="pending-amount">$0.00</div>
            <div class="stat-label">Pending</div>
          </div>
        </div>

        <div class="card">
          <h3 style="margin-top: 0;">Bill History</h3>
          <div id="bills-list">
            <div class="text-center text-muted py-4">Loading bills...</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard(['patient']);

    const patientMenu = [
      { label: 'Home', path: '../patient/index.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>' },
      { label: 'Self Booking', path: '../patient/self-booking.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' },
      { label: 'Scheduled Sessions', path: '../patient/schedule.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' },
      { label: 'My Bookings', path: '../patient/bookings.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9h12M6 9a6 6 0 0 0-6 6v3h24v-3a6 6 0 0 0-6-6M6 9V7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2M9 17v4M15 17v4"/></svg>' },
      { label: 'Medical History', path: '../patient/history.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' },
      { label: 'My Bills', path: '../patient/billing.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>' },
      { label: 'My Profile', path: '../patient/profile.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' }
    ];

    Utils.renderSidebar(patientMenu, '../patient/billing.html', 'Your Health', 'Patient Portal');
    Utils.renderHeader('Bills');

    async function loadBills() {
      const billsList = document.getElementById('bills-list');
      billsList.innerHTML = '<div class="text-center text-muted py-4">Loading bills...</div>';

      try {
        const res = await API.get('/billing/my-invoices/');
        const bills = res.data || res.results || [];
        
        // Calculate stats
        let total = 0, paid = 0, pending = 0;
        bills.forEach(bill => {
          const amt = parseFloat(bill.total_amount || 0);
          total += amt;
          if ((bill.status || '').toLowerCase() === 'paid') {
            paid += amt;
          } else {
            pending += amt;
          }
        });

        document.getElementById('total-amount').textContent = '₹' + total.toFixed(2);
        document.getElementById('paid-amount').textContent = '₹' + paid.toFixed(2);
        document.getElementById('pending-amount').textContent = '₹' + pending.toFixed(2);

        billsList.innerHTML = '';

        if (bills.length === 0) {
          billsList.innerHTML = '<div class="text-center text-muted py-4">No bills available</div>';
          return;
        }

        bills.forEach(bill => {
          const statusLower = (bill.status || 'pending').toLowerCase();
          let statusClass = 'status-pending';
          if (statusLower === 'paid') {
            statusClass = 'status-paid';
          } else if (statusLower === 'overdue') {
            statusClass = 'status-overdue';
          }

          const billAmt = parseFloat(bill.total_amount || 0).toFixed(2);
          const billDate = (bill.created_at || '').split('T')[0];
          const billType = bill.billing_type || bill.invoice_type || 'OPD Consultation';
          const billNum = bill.id || '-';

          const billHTML = `
            <div class="bill-card">
              <div class="bill-header">
                <div>
                  <div style="font-weight: 600; margin-bottom: 0.5rem;">#INV-${billNum}</div>
                  <div style="font-size: 12px; color: #64748b;">${billType} • ${billDate}</div>
                </div>
                <div style="text-align: right;">
                  <div class="bill-amount">₹${billAmt}</div>
                  <span class="status-badge ${statusClass}" style="margin-top: 0.5rem;">${statusLower.toUpperCase()}</span>
                </div>
              </div>
            </div>
          `;
          billsList.innerHTML += billHTML;
        });
      } catch (err) {
        console.error('Error loading bills:', err);
        billsList.innerHTML = '<div class="text-center text-danger py-4">Error loading bills</div>';
      }
    }

    loadBills();
  </script>
</body>
</html>
