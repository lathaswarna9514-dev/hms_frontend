<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Registration - eDoc HMS</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <style>
    body {
      background: radial-gradient(100% 100% at 50% 0%, var(--background) 0%, var(--foreground) 120%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .register-card {
      max-width: 480px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: 2.5rem 2rem;
    }
  </style>
</head>
<body>

  <div class="register-card animate-scaleIn">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div style="color: var(--primary); font-size: 2.5rem; margin-bottom: 0.5rem; display: inline-flex; align-items: center; justify-content: center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      </div>
      <h2 class="font-bold">New Account</h2>
      <p class="text-muted mt-1">Register as a patient to schedule bookings online</p>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position: relative;">
<input type="password" id="password" class="form-control" placeholder="Min. 8 characters" required style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div style="position: relative;">
<input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
      </div>

      <button type="submit" id="submitBtn" class="btn btn-primary w-full mt-2">
        Create Patient Account
      </button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem;">
      <p class="text-sm text-muted">
        Already registered? <a href="login.html" class="font-medium text-primary hover:underline">Login here</a>
      </p>
      <div class="divider"></div>
      <a href="../index.html" class="text-sm font-medium text-muted hover:text-primary">
        &larr; Back to Role Portal Directory
      </a>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard();

    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        Utils.showToast('Passwords do not match.', 'danger');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = 'Creating account...';

      try {
        const response = await API.post('/auth/register/', { 
          name, 
          email, 
          password, 
          confirm_password: confirmPassword 
        });
        
        if (response.success) {
          Auth.saveSession(response.data);
          Utils.showToast('Registration successful! Welcome.', 'success');
          setTimeout(() => {
            Auth.redirectToDashboard(response.data.user.role);
          }, 1000);
        } else {
          Utils.showToast(response.message || 'Registration failed', 'danger');
        }
      } catch (err) {
        Utils.showToast(err.message || 'An error occurred during registration', 'danger');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Create Patient Account';
      }
    });
  </script>
</body>
</html>
