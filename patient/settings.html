<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings - eDoc HMS</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

  <div class="layout-container">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <div class="content-wrapper">

        <div style="margin-bottom: 2rem;">
          <h1 style="font-size: 1.75rem; font-weight: 700; margin: 0;">Account Settings</h1>
        </div>

        <div class="card" style="max-width: 600px;">
          <form id="settingsForm">
            <div class="form-group">
              <label class="form-label" for="name">Full Name</label>
              <input type="text" id="name" name="name" class="form-input" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="address">Address</label>
              <input type="text" id="address" name="address" class="form-input" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="nic">National ID / NIC</label>
              <input type="text" id="nic" name="nic" class="form-input" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="dob">Date of Birth</label>
              <input type="date" id="dob" name="dob" class="form-input" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="telephone">Telephone</label>
              <input type="tel" id="telephone" name="telephone" class="form-input" required>
            </div>

            <div style="border-top: 1px solid #e2e8f0; padding-top: 1.5rem; margin-top: 1.5rem;">
              <h3 style="margin-top: 0; font-size: 1rem;">Change Password</h3>
              
              <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Leave blank to keep current">
              </div>

              <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Confirm new password">
              </div>
            </div>

            <div id="errorMessage" class="alert alert-danger mt-3" style="display: none;"></div>
            <div id="successMessage" class="alert alert-success mt-3" style="display: none;"></div>

            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
              <button type="button" id="deleteAccountBtn" class="btn btn-secondary" style="background-color: rgba(239, 68, 68, 0.1); color: #ef4444;">
                Delete Account
              </button>
              <button type="submit" class="btn btn-primary" style="margin-left: auto;">
                Save Changes
              </button>
            </div>
          </form>
        </div>

      </div>
    </main>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard(['patient']);

    const patientMenu = [
      { label: 'Home', path: '../patient/index.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>' },
      { label: 'Self Booking', path: '../patient/self-booking.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' },
      { label: 'Scheduled Sessions', path: '../patient/schedule.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' },
      { label: 'My Bookings', path: '../patient/bookings.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9h12M6 9a6 6 0 0 0-6 6v3h24v-3a6 6 0 0 0-6-6M6 9V7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2M9 17v4M15 17v4"/></svg>' },
      { label: 'Medical History', path: '../patient/history.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' },
      { label: 'My Bills', path: '../patient/billing.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>' },
      { label: 'My Profile', path: '../patient/profile.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' }
    ];

    Utils.renderSidebar(patientMenu, '../patient/settings.html', 'Your Health', 'Patient Portal');
    Utils.renderHeader('Settings');

    const form = document.getElementById('settingsForm');
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');

    async function loadProfile() {
      try {
        const res = await API.get('/patient/profile/');
        const patient = res.data;

        document.getElementById('name').value = patient.name || '';
        document.getElementById('address').value = patient.address || '';
        document.getElementById('nic').value = patient.nic || '';
        document.getElementById('dob').value = patient.dob || '';
        document.getElementById('telephone').value = patient.telephone || '';
      } catch (err) {
        console.error("Profile load failed:", err);
        errorDiv.textContent = 'Failed to load profile';
        errorDiv.style.display = 'block';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorDiv.textContent = '';
      errorDiv.style.display = 'none';
      successDiv.textContent = '';
      successDiv.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const address = document.getElementById('address').value.trim();
      const nic = document.getElementById('nic').value.trim();
      const dob = document.getElementById('dob').value;
      const telephone = document.getElementById('telephone').value.trim();
      const password = document.getElementById('password').value;
      const confirm_password = document.getElementById('confirm_password').value;

      if (password && password !== confirm_password) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.style.display = 'block';
        return;
      }

      const updateData = { name, address, nic, dob, telephone };
      if (password) {
        updateData.password = password;
      }

      try {
        const res = await API.post('/patient/profile/update/', updateData);
        successDiv.textContent = 'Profile updated successfully!';
        successDiv.style.display = 'block';
        
        document.getElementById('password').value = '';
        document.getElementById('confirm_password').value = '';
      } catch (err) {
        console.error("Profile update failed:", err);
        errorDiv.textContent = err.message || 'Failed to update profile';
        errorDiv.style.display = 'block';
      }
    });

    document.getElementById('deleteAccountBtn').addEventListener('click', async () => {
      const confirm1 = confirm("Are you sure you want to delete your account? All booking records will be permanently deleted.");
      if (confirm1) {
        const confirm2 = confirm("THIS ACTION IS IRREVERSIBLE. Are you absolutely sure?");
        if (confirm2) {
          try {
            await API.post('/patient/account/delete/', {});
            alert("Your account has been deleted.");
            window.location.href = '../index.html';
          } catch (err) {
            alert(err.message || 'Failed to delete account');
          }
        }
      }
    });

    loadProfile();
  </script>
</body>
</html>
