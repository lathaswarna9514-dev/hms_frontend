<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical History - eDoc HMS</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
      .history-card {
        border-left: 4px solid #667eea;
        background: #f8fafc;
        padding: 1.5rem;
        margin-bottom: 1rem;
        border-radius: 6px;
      }

      .history-title { font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
      .history-meta { font-size: 12px; color: #64748b; margin-bottom: 1rem; }
      .history-detail { margin-bottom: 0.5rem; color: #475569; }

      .vitals-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
      }

      .vital-box {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        padding: 1rem;
        text-align: center;
      }

      .vital-label { font-size: 12px; color: #64748b; text-transform: uppercase; }
      .vital-value { font-size: 1.5rem; font-weight: 700; color: #667eea; margin: 0.5rem 0; }

      @media (max-width: 768px) {
        .vitals-grid { grid-template-columns: repeat(2, 1fr); }
      }
    </style>
</head>
<body>

  <div class="layout-container">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <div class="content-wrapper">
        
        <div style="margin-bottom: 2rem;">
          <h1 style="font-size: 1.75rem; font-weight: 700; margin: 0;">Medical History</h1>
        </div>

        <div class="card">
          <h3 style="margin-top: 0;">Past Consultations</h3>
          <div id="history-list">
            <div class="text-center text-muted py-4">Loading medical history...</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard(['patient']);

    const patientMenu = [
      { label: 'Home', path: '../patient/index.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>' },
      { label: 'Self Booking', path: '../patient/self-booking.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' },
      { label: 'Scheduled Sessions', path: '../patient/schedule.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' },
      { label: 'My Bookings', path: '../patient/bookings.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9h12M6 9a6 6 0 0 0-6 6v3h24v-3a6 6 0 0 0-6-6M6 9V7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2M9 17v4M15 17v4"/></svg>' },
      { label: 'Medical History', path: '../patient/history.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' },
      { label: 'My Bills', path: '../patient/billing.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>' },
      { label: 'My Profile', path: '../patient/profile.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' }
    ];

    Utils.renderSidebar(patientMenu, '../patient/history.html', 'Your Health', 'Patient Portal');
    Utils.renderHeader('Medical History');

    async function loadHistory() {
      const historyList = document.getElementById('history-list');
      historyList.innerHTML = '<div class="text-center text-muted py-4">Loading medical history...</div>';

      try {
        const res = await API.get('/patient/medical-history/');
        const records = res.data || [];
        historyList.innerHTML = '';

        if (records.length === 0) {
          historyList.innerHTML = '<div class="text-center text-muted py-4">No medical history available</div>';
          return;
        }

        records.forEach(record => {
          const historyHTML = `
            <div class="history-card">
              <div class="history-title">${record.consultation_title || 'Consultation'}</div>
              <div class="history-meta">
                Dr. ${record.doctor_name} • ${record.consultation_date}
              </div>
              <div class="history-detail"><strong>Notes:</strong> ${record.notes || 'N/A'}</div>
              <div class="history-detail"><strong>Prescription:</strong> ${record.prescription || 'None'}</div>
              ${record.vitals ? `
                <div class="vitals-grid">
                  ${Object.entries(record.vitals).map(([key, val]) => `
                    <div class="vital-box">
                      <div class="vital-label">${key}</div>
                      <div class="vital-value">${val}</div>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
            </div>
          `;
          historyList.innerHTML += historyHTML;
        });
      } catch (err) {
        console.error('Error loading history:', err);
        historyList.innerHTML = '<div class="text-center text-danger py-4">Error loading medical history</div>';
      }
    }

    loadHistory();
  </script>
</body>
</html>
