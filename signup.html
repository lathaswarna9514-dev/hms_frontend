<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/animations.css">  
    <link rel="stylesheet" href="css/main.css">  
    <link rel="stylesheet" href="css/signup.css">
    <title>Sign Up</title>
</head>
<body>
    <center>
    <div class="container">
        <table border="0">
            <tr>
                <td colspan="2">
                    <p class="header-text">Let's Get Started</p>
                    <p class="sub-text">Add Your Personal Details to Continue</p>
                </td>
            </tr>
            <form id="personalDetailsForm">
                <tr>
                    <td class="label-td" colspan="2">
                        <label class="form-label">Name: </label>
                    </td>
                </tr>
                <tr>
                    <td class="label-td">
                        <input type="text" id="fname" name="fname" class="input-text" placeholder="First Name" required>
                    </td>
                    <td class="label-td">
                        <input type="text" id="lname" name="lname" class="input-text" placeholder="Last Name" required>
                    </td>
                </tr>
                <tr>
                    <td class="label-td" colspan="2">
                        <label for="address" class="form-label">Address: </label>
                    </td>
                </tr>
                <tr>
                    <td class="label-td" colspan="2">
                        <input type="text" id="address" name="address" class="input-text" placeholder="Address" required>
                    </td>
                </tr>
                <tr>
                    <td class="label-td" colspan="2">
                        <label for="nic" class="form-label">NIC: </label>
                    </td>
                </tr>
                <tr>
                    <td class="label-td" colspan="2">
                        <input type="text" id="nic" name="nic" class="input-text" placeholder="NIC Number" required>
                    </td>
                </tr>
                <tr>
                    <td class="label-td" colspan="2">
                        <label for="dob" class="form-label">Date of Birth: </label>
                    </td>
                </tr>
                <tr>
                    <td class="label-td" colspan="2">
                        <input type="date" id="dob" name="dob" class="input-text" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="reset" value="Reset" class="login-btn btn-primary-soft btn" >
                    </td>
                    <td>
                        <input type="submit" value="Next" class="login-btn btn-primary btn">
                    </td>
                </tr>
            </form>
            <tr>
                <td colspan="2">
                    <br>
                    <label for="" class="sub-text" style="font-weight: 280;">Already have an account? </label>
                    <a href="login.html" class="hover-link1 non-style-link">Login</a>
                    <br><br><br>
                </td>
            </tr>
        </table>
    </div>
    </center>

    <script type="module">
        import { ApiService } from './services/api.js';

        // Redirect if already authenticated
        if (ApiService.auth.isAuthenticated()) {
            const user = ApiService.auth.getUser();
            if (user) {
                if (user.usertype === 'a') window.location.href = 'admin/index.html';
                else if (user.usertype === 'd') window.location.href = 'doctor/index.html';
                else if (user.usertype === 'p') window.location.href = 'patient/index.html';
            }
        }

        const form = document.getElementById('personalDetailsForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const personalData = {
                fname: document.getElementById('fname').value.trim(),
                lname: document.getElementById('lname').value.trim(),
                address: document.getElementById('address').value.trim(),
                nic: document.getElementById('nic').value.trim(),
                dob: document.getElementById('dob').value
            };

            sessionStorage.setItem('signup_personal_data', JSON.stringify(personalData));
            window.location.href = 'create-account.html';
        });
    </script>

    <script src="assets/js/utils.js"></script>
</body>
</html>
