<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/animations.css">  
    <link rel="stylesheet" href="../css/main.css">  
    <link rel="stylesheet" href="../css/admin.css">
    <title>Doctors Management</title>
    <style>
        .sub-table{
            animation: transitionIn-Y-bottom 0.5s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="sidebar-container"></div>
        <div class="dash-body">
            <div id="header-container"></div>

            <table border="0" width="93%" class="filter-container" style="border: none; margin-left: 20px;">
                <tr>
                    <td width="30%">
                        <p style="font-size: 20px; font-weight: 600; padding-left: 12px;">Doctors Management</p>
                    </td>
                    <td width="30%">
                        <form id="searchForm" style="display: flex;">
                            <input type="search" id="doctorSearch" class="input-text header-searchbar" placeholder="Search Doctor name or Email" style="width: 100%;">
                            <input type="submit" value="Search" class="login-btn btn-primary btn" style="margin-left: 10px; margin-top:0;">
                        </form>
                    </td>
                    <td width="20%" style="text-align: right;">
                        <button class="btn btn-primary" id="addNewBtn" style="padding: 10px 20px;">+ Add New Doctor</button>
                    </td>
                </tr>
            </table>

            <center>
            <div class="abc" style="width: 93%; height: 500px; border: 1px solid #ebebeb; border-radius: 8px; background: #fff; margin-top: 10px;">
                <table width="100%" class="sub-table" border="0" id="doctors-table">
                    <thead>
                        <tr>
                            <th class="table-headin">Doctor Name</th>
                            <th class="table-headin">Email</th>
                            <th class="table-headin">Specialty</th>
                            <th class="table-headin">Telephone</th>
                            <th class="table-headin">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 40px; color: #777;">Loading doctors...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            </center>
        </div>
    </div>

    <!-- Add/Edit Doctor Modal -->
    <div id="doctorModal" class="overlay" style="display: none; align-items: center; justify-content: center;">
        <div class="popup" style="width: 45%; margin: 0; animation: transitionIn-Y-bottom 0.3s;">
            <h2 id="modalTitle">Add New Doctor</h2>
            <a class="close" href="#" id="closeModal">&times;</a>
            <div class="content" style="max-height: 450px; overflow-y: auto;">
                <form id="doctorForm">
                    <table width="100%" border="0" style="border-spacing: 0 12px;">
                        <tr>
                            <td width="30%" style="font-weight:600;">Name:</td>
                            <td>
                                <input type="text" id="docName" class="input-text" placeholder="Dr. John Doe" required>
                            </td>
                        </tr>
                        <tr>
                            <td style="font-weight:600;">Email:</td>
                            <td>
                                <input type="email" id="docEmail" class="input-text" placeholder="doctor@edoc.com" required>
                            </td>
                        </tr>
                        <tr>
                            <td style="font-weight:600;">NIC:</td>
                            <td>
                                <input type="text" id="docNic" class="input-text" placeholder="NIC Number" required>
                            </td>
                        </tr>
                        <tr>
                            <td style="font-weight:600;">Telephone:</td>
                            <td>
                                <input type="tel" id="docTelephone" class="input-text" placeholder="Telephone" required>
                            </td>
                        </tr>
                        <tr>
                            <td style="font-weight:600;">Specialty:</td>
                            <td>
                                <select id="docSpecialty" class="box" style="width:100%; height:40px;" required>
                                    <option value="">Select Specialty</option>
                                </select>
                            </td>
                        </tr>
                        <tr class="pwd-field">
                            <td style="font-weight:600;">Password:</td>
                            <td>
                                <div style="position: relative;">
<input type="password" id="docPassword" class="input-text" placeholder="Password" style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
                            </td>
                        </tr>
                        <tr class="pwd-field">
                            <td style="font-weight:600;">Confirm Password:</td>
                            <td>
                                <div style="position: relative;">
<input type="password" id="docConfirmPassword" class="input-text" placeholder="Confirm Password" style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
                            </td>
                        </tr>
                    </table>
                    <br>
                    <div id="modalError" style="color: rgb(255, 62, 62); text-align: center; font-size: 14px; margin-bottom: 15px;"></div>
                    <div style="text-align: right;">
                        <input type="submit" value="Save Doctor" class="btn btn-primary" style="padding: 10px 25px;">
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { ApiService } from '../services/api.js';
        import { initNavigation } from './navigation.js';

        initNavigation('doctors');

        const tableBody = document.querySelector('#doctors-table tbody');
        const searchForm = document.getElementById('searchForm');
        const doctorModal = document.getElementById('doctorModal');
        const doctorForm = document.getElementById('doctorForm');
        const specialtySelect = document.getElementById('docSpecialty');
        
        let editingDoctorId = null;

        // Fetch specialties on load
        async function loadSpecialties() {
            try {
                const res = await ApiService.doctors.getSpecialties();
                specialtySelect.innerHTML = '<option value="">Select Specialty</option>';
                res.data.forEach(sp => {
                    const opt = document.createElement('option');
                    opt.value = sp.id;
                    opt.textContent = sp.name;
                    specialtySelect.appendChild(opt);
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function loadDoctors(search = '') {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 40px; color: #777;">Loading doctors...</td></tr>`;
            try {
                const res = await ApiService.doctors.getAll(search);
                tableBody.innerHTML = '';
                if (res.data.length > 0) {
                    res.data.forEach(doc => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="padding: 15px; font-weight: 600;">Dr. ${doc.name}</td>
                            <td style="padding: 15px;">${doc.email}</td>
                            <td style="padding: 15px;">${doc.specialty_name || 'General'}</td>
                            <td style="padding: 15px; text-align: center;">${doc.telephone || 'N/A'}</td>
                            <td style="padding: 15px; text-align: center;">
                                <button class="btn btn-primary-soft btn-edit" data-id="${doc.id}" style="padding: 5px 12px; font-size:12px;">Edit</button>
                                <button class="btn btn-primary btn-delete" data-id="${doc.id}" style="padding: 5px 12px; font-size:12px; margin-left: 5px; background-color: rgba(255, 62, 62, 0.1); color: rgb(255, 62, 62); border: none;">Delete</button>
                            </td>
                        `;
                        tableBody.appendChild(tr);
                    });

                    // Handlers
                    document.querySelectorAll('.btn-edit').forEach(btn => {
                        btn.addEventListener('click', (e) => editDoctor(e.target.getAttribute('data-id')));
                    });
                    document.querySelectorAll('.btn-delete').forEach(btn => {
                        btn.addEventListener('click', (e) => deleteDoctor(e.target.getAttribute('data-id')));
                    });
                } else {
                    tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">No doctors found.</td></tr>`;
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Add Doctor Button Trigger
        document.getElementById('addNewBtn').addEventListener('click', () => {
            editingDoctorId = null;
            document.getElementById('modalTitle').textContent = 'Add New Doctor';
            doctorForm.reset();
            
            // Password fields required for new doctor
            document.getElementById('docPassword').required = true;
            document.getElementById('docConfirmPassword').required = true;
            
            document.getElementById('modalError').textContent = '';
            doctorModal.style.display = 'flex';
        });

        // Edit Doctor Trigger
        async function editDoctor(id) {
            try {
                const res = await ApiService.doctors.get(id);
                const doc = res.data;
                editingDoctorId = doc.id;

                document.getElementById('modalTitle').textContent = 'Edit Doctor Details';
                document.getElementById('docName').value = doc.name;
                document.getElementById('docEmail').value = doc.email;
                document.getElementById('docNic').value = doc.nic || '';
                document.getElementById('docTelephone').value = doc.telephone || '';
                document.getElementById('docSpecialty').value = doc.specialty || '';
                
                // Password fields optional for editing
                document.getElementById('docPassword').required = false;
                document.getElementById('docConfirmPassword').required = false;
                document.getElementById('docPassword').value = '';
                document.getElementById('docConfirmPassword').value = '';

                document.getElementById('modalError').textContent = '';
                doctorModal.style.display = 'flex';
            } catch (err) {
                alert('Error loading doctor details.');
            }
        }

        // Delete Doctor
        async function deleteDoctor(id) {
            if (confirm('Are you sure you want to delete this doctor? This will also remove their user account.')) {
                try {
                    await ApiService.doctors.delete(id);
                    alert('Doctor account deleted.');
                    loadDoctors();
                } catch (err) {
                    alert(err.message || 'Failed to delete doctor.');
                }
            }
        }

        // Form Submit Add/Edit
        doctorForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('modalError');
            errorDiv.textContent = '';

            const name = document.getElementById('docName').value.trim();
            const email = document.getElementById('docEmail').value.trim();
            const nic = document.getElementById('docNic').value.trim();
            const telephone = document.getElementById('docTelephone').value.trim();
            const specialty = document.getElementById('docSpecialty').value;
            const password = document.getElementById('docPassword').value;
            const confirm_password = document.getElementById('docConfirmPassword').value;

            if (password && password !== confirm_password) {
                errorDiv.textContent = 'Passwords do not match.';
                return;
            }

            const payload = { name, email, nic, telephone, specialty };
            if (password) {
                payload.password = password;
                payload.confirm_password = confirm_password;
            }

            try {
                if (editingDoctorId) {
                    await ApiService.doctors.update(editingDoctorId, payload);
                    alert('Doctor updated successfully.');
                } else {
                    // Password mandatory for create
                    payload.password = password;
                    payload.confirm_password = confirm_password;
                    await ApiService.doctors.create(payload);
                    alert('Doctor added successfully.');
                }
                doctorModal.style.display = 'none';
                loadDoctors();
            } catch (err) {
                console.error(err);
                if (err.errors) {
                    const keys = Object.keys(err.errors);
                    if (keys.length > 0) {
                        errorDiv.textContent = `${keys[0]}: ${err.errors[keys[0]]}`;
                        return;
                    }
                }
                errorDiv.textContent = err.message || 'Failed to save doctor details.';
            }
        });

        // Close Modal
        document.getElementById('closeModal').addEventListener('click', (e) => {
            e.preventDefault();
            doctorModal.style.display = 'none';
        });

        // Search submit
        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            loadDoctors(document.getElementById('doctorSearch').value.trim());
        });

        // Init
        loadSpecialties();
        loadDoctors();
    </script>

    <script src="../assets/js/utils.js"></script>
</body>
</html>
