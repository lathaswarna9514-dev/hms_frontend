<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/animations.css">  
    <link rel="stylesheet" href="../css/main.css">  
    <link rel="stylesheet" href="../css/admin.css">
    <title>Appointments Management</title>
    <style>
        .sub-table{
            animation: transitionIn-Y-bottom 0.5s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="sidebar-container"></div>
        <div class="dash-body">
            <div id="header-container"></div>

            <table border="0" width="93%" class="filter-container" style="border: none; margin-left: 20px;">
                <tr>
                    <td width="40%">
                        <p style="font-size: 20px; font-weight: 600; padding-left: 12px;">Appointments Management</p>
                    </td>
                    <td width="30%">
                        <form id="searchForm" style="display: flex;">
                            <input type="search" id="apptSearch" class="input-text header-searchbar" placeholder="Search Patient name or Doctor" style="width: 100%;">
                            <input type="submit" value="Search" class="login-btn btn-primary btn" style="margin-left: 10px; margin-top:0;">
                        </form>
                    </td>
                </tr>
            </table>

            <center>
            <div class="abc" style="width: 93%; height: 500px; border: 1px solid #ebebeb; border-radius: 8px; background: #fff; margin-top: 10px;">
                <table width="100%" class="sub-table" border="0" id="appointments-table">
                    <thead>
                        <tr>
                            <th class="table-headin">Appt No.</th>
                            <th class="table-headin">Patient Name</th>
                            <th class="table-headin">Doctor</th>
                            <th class="table-headin">Session Name</th>
                            <th class="table-headin">Scheduled Date & Time</th>
                            <th class="table-headin">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 40px; color: #777;">Loading appointments...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            </center>
        </div>
    </div>

    <script type="module">
        import { ApiService } from '../services/api.js';
        import { initNavigation } from './navigation.js';

        initNavigation('appointments');

        const tableBody = document.querySelector('#appointments-table tbody');
        const searchForm = document.getElementById('searchForm');

        async function loadAppointments(search = '') {
            tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: #777;">Loading appointments...</td></tr>`;
            try {
                const res = await ApiService.appointments.getAll({ search });
                tableBody.innerHTML = '';
                if (res.data.length > 0) {
                    res.data.forEach(appt => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="padding: 15px; text-align: center; font-weight: 600;">#${appt.appointment_number}</td>
                            <td style="padding: 15px; font-weight: 600;">${appt.patient_name} <br><span style="font-size:12px; color:#777;">${appt.patient_telephone || 'N/A'}</span></td>
                            <td style="padding: 15px;">Dr. ${appt.doctor_name}</td>
                            <td style="padding: 15px; font-weight: 500;">${appt.session_title}</td>
                            <td style="padding: 15px; text-align: center;">${appt.schedule_date} @ ${appt.schedule_time}</td>
                            <td style="padding: 15px; text-align: center;">
                                <button class="btn btn-primary btn-delete" data-id="${appt.id}" style="padding: 5px 12px; font-size:12px; background-color: rgba(255, 62, 62, 0.1); color: rgb(255, 62, 62); border: none;">Cancel</button>
                            </td>
                        `;
                        tableBody.appendChild(tr);
                    });

                    // Handlers
                    document.querySelectorAll('.btn-delete').forEach(btn => {
                        btn.addEventListener('click', (e) => cancelAppointment(e.target.getAttribute('data-id')));
                    });
                } else {
                    tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: #999;">No appointments scheduled.</td></tr>`;
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function cancelAppointment(id) {
            if (confirm('Are you sure you want to cancel this appointment? This action cannot be undone.')) {
                try {
                    await ApiService.appointments.cancel(id);
                    alert('Appointment cancelled.');
                    loadAppointments();
                } catch (err) {
                    alert(err.message || 'Failed to cancel appointment.');
                }
            }
        }

        // Search submit
        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            loadAppointments(document.getElementById('apptSearch').value.trim());
        });

        // Init
        loadAppointments();
    </script>

    <script src="../assets/js/utils.js"></script>
</body>
</html>
