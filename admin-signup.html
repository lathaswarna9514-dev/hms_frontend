<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/animations.css">  
    <link rel="stylesheet" href="css/main.css">  
    <link rel="stylesheet" href="css/signup.css">
    <title>Admin Sign Up</title>
</head>
<body>
    <center>
    <div class="container" style="width: 45%;">
        <table border="0" style="width: 90%;">
            <tr>
                <td colspan="2">
                    <p class="header-text">Administrator Registration</p>
                    <p class="sub-text">Create a new administrator account below</p>
                </td>
            </tr>
            <form id="adminSignupForm">
                <tr>
                    <td class="label-td" colspan="2">
                        <label for="adminemail" class="form-label">Email Address: </label>
                    </td>
                </tr>
                <tr>
                    <td class="label-td" colspan="2">
                        <input type="email" id="adminemail" name="adminemail" class="input-text" placeholder="Email Address" required>
                    </td>
                </tr>
                <tr>
                    <td class="label-td" colspan="2">
                        <label for="adminpassword" class="form-label">Create Password: </label>
                    </td>
                </tr>
                <tr>
                    <td class="label-td" colspan="2">
                        <div style="position: relative;">
<input type="password" id="adminpassword" name="adminpassword" class="input-text" placeholder="Password" required minlength="3" style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
                    </td>
                </tr>
                <tr>
                    <td class="label-td" colspan="2">
                        <label for="admincpassword" class="form-label">Confirm Password: </label>
                    </td>
                </tr>
                <tr>
                    <td class="label-td" colspan="2">
                        <div style="position: relative;">
<input type="password" id="admincpassword" name="admincpassword" class="input-text" placeholder="Confirm Password" required minlength="3" style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <br>
                        <div id="errorMessage" style="color:rgb(255, 62, 62); text-align:center; font-size:14px; font-weight:500;"></div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <a href="admin-login.html" class="non-style-link"><input type="button" value="Back to Login" class="login-btn btn-primary-soft btn" style="width:100%"></a>
                    </td>
                    <td>
                        <input type="submit" value="Sign Up" class="login-btn btn-primary btn" style="width:100%">
                    </td>
                </tr>
            </form>
        </table>
    </div>
    </center>

    <script type="module">
        import { ApiService } from './services/api.js';

        // Redirect if already authenticated
        if (ApiService.auth.isAuthenticated()) {
            const user = ApiService.auth.getUser();
            if (user && user.usertype === 'a') {
                window.location.href = 'admin/index.html';
            }
        }

        const form = document.getElementById('adminSignupForm');
        const errorDiv = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.textContent = '';

            const email = document.getElementById('adminemail').value.trim();
            const password = document.getElementById('adminpassword').value;
            const confirm_password = document.getElementById('admincpassword').value;

            if (password !== confirm_password) {
                errorDiv.textContent = 'Passwords do not match.';
                return;
            }

            const payload = {
                email,
                password,
                confirm_password
            };

            try {
                await ApiService.auth.registerAdmin(payload);
                window.location.href = 'admin/index.html';
            } catch (err) {
                console.error("Registration failed:", err);
                if (err.errors) {
                    const keys = Object.keys(err.errors);
                    if (keys.length > 0) {
                        errorDiv.textContent = `${keys[0]}: ${err.errors[keys[0]]}`;
                        return;
                    }
                }
                errorDiv.textContent = err.message || 'Registration failed due to a server error.';
            }
        });
    </script>

    <script src="assets/js/utils.js"></script>
</body>
</html>
