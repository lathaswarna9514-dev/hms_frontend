<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - eDoc HMS</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

  <div class="layout-container">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <div class="content-wrapper">
        <div style="width: 100%; max-width: 640px; margin: 0 auto;">

        <div style="margin-bottom: 2rem;">
          <h2 class="font-bold">My Profile</h2>
          <p class="text-muted mt-1">View and update your front desk staff account details.</p>
        </div>

        <div class="card" style="max-width:600px;">

          <!-- Avatar Row -->
          <div class="flex items-center mb-6" style="gap:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);">
            <div id="fdAvatar" style="width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;color:#fff;flex-shrink:0;">F</div>
            <div>
              <div class="font-bold text-lg" id="fdNameHeader">Loading...</div>
              <div class="text-sm text-muted" id="fdEmailHeader"></div>
              <span class="badge badge-secondary mt-2">Front Desk</span>
            </div>
          </div>

          <form id="profileForm" onsubmit="handleSave(event)">
            <div class="form-group">
              <label class="form-label" for="fdName">Full Name</label>
              <input type="text" id="fdName" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="fdEmail">Email Address</label>
              <input type="email" id="fdEmail" class="form-input" required>
            </div>
            <div class="flex justify-end mt-4" style="gap:.75rem;">
              <button type="button" class="btn btn-secondary" onclick="loadProfile()">Reset</button>
              <button type="submit" class="btn btn-primary">Save Profile</button>
            </div>
          </form>
        </div>

        <!-- Change Password Card -->
        <div class="card mt-5" style="max-width:600px;">
          <h4 class="font-bold mb-4" style="border-bottom:1px solid var(--border);padding-bottom:.75rem;">Change Password</h4>
          <form id="pwdForm" onsubmit="handlePasswordChange(event)">
            <div class="form-group">
              <label class="form-label" for="oldPwd">Current Password</label>
              <div style="position: relative;">
<input type="password" id="oldPwd" class="form-input" required style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="newPwd">New Password</label>
              <div style="position: relative;">
<input type="password" id="newPwd" class="form-input" required style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="confirmPwd">Confirm New Password</label>
              <div style="position: relative;">
<input type="password" id="confirmPwd" class="form-input" required style="padding-right: 2.5rem;">
  <button type="button" onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.innerHTML=p.type==='password'?'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>':'<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22\'/></svg>';" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
            </div>
            <div class="flex justify-end mt-3">
              <button type="submit" class="btn btn-primary">Update Password</button>
            </div>
          </form>
        </div>

        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard(['frontdesk']);

    const fdMenu = [
      { label: 'Dashboard', path: '../frontdesk/dashboard.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>' },
      { label: 'OPD Appointments', path: '../frontdesk/appointments.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' },
      { label: 'IPD Admissions', path: '../frontdesk/ipd.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h18"/><path d="M12 14v8"/><path d="M8 22h8"/><path d="M5 14V4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v10"/></svg>' },
      { label: 'Patient Search', path: '../frontdesk/patients.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' },
      { label: 'Billing Desk', path: '../frontdesk/billing.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>' },
      { label: 'My Profile', path: '../frontdesk/profile.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' }
    ];

    Utils.renderSidebar(fdMenu, '../frontdesk/profile.html', 'Front Desk', 'Registration Portal');
    Utils.renderHeader('My Profile');

    function loadProfile() {
      const user = Auth.getUser();
      if (!user) return;
      document.getElementById('fdName').value = user.name || '';
      document.getElementById('fdEmail').value = user.email || '';
      document.getElementById('fdNameHeader').innerText = user.name || 'Front Desk Staff';
      document.getElementById('fdEmailHeader').innerText = user.email || '';
      const initials = (user.name || 'FD').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
      document.getElementById('fdAvatar').innerText = initials;
    }

    async function handleSave(e) {
      e.preventDefault();
      try {
        await API.patch('/auth/profile/', {
          name: document.getElementById('fdName').value,
          email: document.getElementById('fdEmail').value
        });
        Utils.showToast('Profile updated successfully', 'success');
      } catch (err) {
        Utils.showToast(err.message || 'Update failed', 'danger');
      }
    }

    async function handlePasswordChange(e) {
      e.preventDefault();
      const newPwd = document.getElementById('newPwd').value;
      if (newPwd !== document.getElementById('confirmPwd').value) {
        Utils.showToast('Passwords do not match', 'danger');
        return;
      }
      try {
        await API.patch('/auth/profile/', {
          old_password: document.getElementById('oldPwd').value,
          new_password: newPwd
        });
        Utils.showToast('Password changed successfully', 'success');
        document.getElementById('pwdForm').reset();
      } catch (err) {
        Utils.showToast(err.message || 'Password change failed', 'danger');
      }
    }

    loadProfile();
  </script>
</body>
</html>
