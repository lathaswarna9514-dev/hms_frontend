<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments - eDoc HMS</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

  <div class="layout-container">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <div class="content-wrapper">

        <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
          <div>
            <h2 class="font-bold">Appointment Management</h2>
            <p class="text-muted mt-1">View, search, and register walk-in appointments for patients.</p>
          </div>
          <button class="btn btn-primary" onclick="openBookingModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:0.5rem"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Walk-in Booking
          </button>
        </div>

        <!-- Filters -->
        <div class="flex gap-3 mb-5" style="flex-wrap:wrap;">
          <input type="date" id="filterDate" class="form-input" style="max-width:180px;" onchange="loadAppointments()">
          <input type="text" id="filterSearch" class="form-input" placeholder="Search patient or doctor..." style="max-width:280px;" oninput="debounceSearch()">
          <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
        </div>

        <!-- Appointments Table -->
        <div class="card">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Appt #</th>
                  <th>Patient</th>
                  <th>Doctor</th>
                  <th>Session</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="apptBody">
                <tr><td colspan="7" class="text-center text-muted py-4">Loading appointments...</td></tr>
              </tbody>
            </table>
            </div>
            <div id="paginationContainer"></div>
          <div id="apptCount" class="text-xs text-muted mt-3 px-1"></div>
        </div>

      </div>
    </main>
  </div>

  <!-- Walk-in Booking Modal -->
  <div id="bookingModal" class="modal">
    <div class="modal-content" style="max-width:540px;">
      <div class="modal-header">
        <h4 class="font-bold">Walk-in / Offline Appointment</h4>
        <button class="btn btn-sm" onclick="closeBookingModal()">&times;</button>
      </div>
      <div class="modal-body">

        <!-- Step 1: Patient -->
        <div id="step1">
          <div class="form-group">
            <label class="form-label" for="patientSearch">Search Patient (name, email or NIC)</label>
            <input type="text" id="patientSearch" class="form-input" placeholder="Start typing..." oninput="searchPatient()">
          </div>
          <div id="patientResults" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);"></div>
          <div id="selectedPatientInfo" class="mt-3" style="display:none;">
            <div class="flex items-center gap-3 p-3" style="background:var(--bg-secondary);border-radius:var(--radius);border:1px solid var(--border);">
              <div style="width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;" id="selPatientAvatar">P</div>
              <div>
                <div class="font-bold" id="selPatientName"></div>
                <div class="text-sm text-muted" id="selPatientEmail"></div>
              </div>
              <button class="btn btn-sm btn-secondary ml-auto" onclick="clearPatient()">Change</button>
            </div>
          </div>
        </div>

        <!-- Step 2: Session -->
        <div class="form-group mt-4">
          <label class="form-label" for="sessionSelect">Select Consultation Session</label>
          <select id="sessionSelect" class="form-input">
            <option value="">Choose a session...</option>
          </select>
          <div id="sessionInfo" class="text-xs text-muted mt-2"></div>
        </div>

      </div>
      <div class="modal-footer flex justify-end" style="gap:.75rem;">
        <button type="button" class="btn btn-secondary" onclick="closeBookingModal()">Cancel</button>
        <button class="btn btn-primary" id="confirmBookBtn" onclick="confirmBooking()">Confirm Booking</button>
      </div>
    </div>
  </div>

  <!-- Booking Confirmation Modal -->
  <div id="confirmModal" class="modal">
    <div class="modal-content" style="max-width:420px;text-align:center;">
      <div class="modal-body" style="padding:2rem;">
        <div style="font-size:3rem;margin-bottom:1rem;">✅</div>
        <h4 class="font-bold mb-2">Booking Confirmed!</h4>
        <div id="confirmDetails" class="text-muted text-sm" style="line-height:1.8;"></div>
        <div class="mt-3 p-3" style="background:var(--bg-secondary);border-radius:var(--radius);">
          <div class="text-xs text-muted">Appointment Number</div>
          <div class="font-bold" style="font-size:2rem;color:var(--primary);" id="confirmApptNum">#—</div>
        </div>
        <button class="btn btn-primary mt-4" onclick="closeConfirmModal()">Done</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard(['frontdesk']);

    const fdMenu = [
      { label: 'Dashboard', path: '../frontdesk/dashboard.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>' },
      { label: 'OPD Appointments', path: '../frontdesk/appointments.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' },
      { label: 'IPD Admissions', path: '../frontdesk/ipd.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h18"/><path d="M12 14v8"/><path d="M8 22h8"/><path d="M5 14V4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v10"/></svg>' },
      { label: 'Patient Search', path: '../frontdesk/patients.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' },
      { label: 'Billing Desk', path: '../frontdesk/billing.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>' },
      { label: 'My Profile', path: '../frontdesk/profile.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' }
    ];

    Utils.renderSidebar(fdMenu, '../frontdesk/appointments.html', 'Front Desk', 'Registration Portal');
    Utils.renderHeader('Appointments');

    let searchTimeout = null;
    let selectedPatientId = null;

    // Set today's date by default
    document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];

    let currentPage = 1;

    async function loadAppointments() {
      const date = document.getElementById('filterDate').value;
      const search = document.getElementById('filterSearch').value;
      let query = `?page=${currentPage}&`;
      if (date) query += `date=${date}&`;
      if (search) query += `search=${encodeURIComponent(search)}&`;

      try {
        const res = await API.get(`/appointments/${query}`);
        const appts = res.data.results || res.data || [];
        const totalCount = res.data.count !== undefined ? res.data.count : appts.length;
        document.getElementById('apptCount').innerText = `${totalCount} appointment(s) found.`;
        renderTable(appts);
        Utils.renderPagination('paginationContainer', totalCount, currentPage, 15, (newPage) => {
          currentPage = newPage;
          loadAppointments();
        });
      } catch (err) {
        Utils.showToast('Failed to load appointments', 'danger');
      }
    }

    function renderTable(appts) {
      const tbody = document.getElementById('apptBody');
      if (appts.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted">No appointments found for the selected filters.</td></tr>`;
        return;
      }
      tbody.innerHTML = appts.map(a => `
        <tr>
          <td><span class="badge badge-secondary">#${a.appointment_number}</span></td>
          <td><strong>${a.patient_name}</strong></td>
          <td>${a.doctor_name}</td>
          <td>${a.session_title}</td>
          <td>${a.schedule_date}</td>
          <td>${a.schedule_time}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="cancelAppt(${a.id})">Cancel</button>
          </td>
        </tr>`).join('');
    }

    function debounceSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        currentPage = 1;
        loadAppointments();
      }, 350);
    }

    function clearFilters() {
      document.getElementById('filterDate').value = '';
      document.getElementById('filterSearch').value = '';
      loadAppointments();
    }

    async function cancelAppt(id) {
      if (!confirm('Cancel this appointment? The slot will be freed.')) return;
      try {
        await API.delete(`/appointments/${id}/`);
        Utils.showToast('Appointment cancelled', 'success');
        loadAppointments();
      } catch (err) {
        Utils.showToast('Failed to cancel appointment', 'danger');
      }
    }

    // ── Walk-in Booking Modal ──────────────────────────────────────────────
    async function openBookingModal() {
      selectedPatientId = null;
      document.getElementById('patientSearch').value = '';
      document.getElementById('patientResults').innerHTML = '';
      document.getElementById('selectedPatientInfo').style.display = 'none';
      document.getElementById('sessionInfo').innerText = '';

      // Load upcoming sessions
      try {
        const res = await API.get('/schedules/?upcoming=true');
        const sessions = res.data || [];
        const select = document.getElementById('sessionSelect');
        select.innerHTML = '<option value="">Choose a session...</option>' +
          sessions.map(s => `<option value="${s.id}" data-max="${s.max_patients}" data-booked="${s.booked_count}">${s.doctor_name} — ${s.title} | ${s.schedule_date} ${s.schedule_time} (${s.max_patients - s.booked_count} slots left)</option>`).join('');
      } catch (err) {
        Utils.showToast('Failed to load sessions', 'danger');
      }

      document.getElementById('sessionSelect').onchange = function() {
        const opt = this.selectedOptions[0];
        if (!opt.value) { document.getElementById('sessionInfo').innerText = ''; return; }
        const max = parseInt(opt.dataset.max);
        const booked = parseInt(opt.dataset.booked);
        const left = max - booked;
        document.getElementById('sessionInfo').innerText = `${booked} booked · ${left} slots remaining out of ${max}`;
      };

      document.getElementById('bookingModal').classList.add('active');
    }

    function closeBookingModal() {
      document.getElementById('bookingModal').classList.remove('active');
    }

    let patSearchTimeout = null;
    function searchPatient() {
      clearTimeout(patSearchTimeout);
      patSearchTimeout = setTimeout(async () => {
        const q = document.getElementById('patientSearch').value.trim();
        if (q.length < 2) { document.getElementById('patientResults').innerHTML = ''; return; }
        try {
          const res = await API.get(`/patients/?search=${encodeURIComponent(q)}`);
          const patients = res.data || [];
          const el = document.getElementById('patientResults');
          if (patients.length === 0) {
            el.innerHTML = `<div style="padding:.75rem 1rem;color:var(--text-muted);font-size:.875rem;">No patients found.</div>`;
            return;
          }
          el.innerHTML = patients.map(p => `
            <div onclick="selectPatient(${p.id}, '${p.name}', '${p.email}')"
                 style="padding:.75rem 1rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s;"
                 onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background=''">
              <strong>${p.name}</strong>
              <span class="text-sm text-muted ml-2">${p.email}</span>
            </div>`).join('');
        } catch (err) {
          console.error(err);
        }
      }, 300);
    }

    function selectPatient(id, name, email) {
      selectedPatientId = id;
      document.getElementById('patientSearch').value = '';
      document.getElementById('patientResults').innerHTML = '';
      document.getElementById('selPatientName').innerText = name;
      document.getElementById('selPatientEmail').innerText = email;
      document.getElementById('selPatientAvatar').innerText = name.charAt(0).toUpperCase();
      document.getElementById('selectedPatientInfo').style.display = 'block';
    }

    function clearPatient() {
      selectedPatientId = null;
      document.getElementById('selectedPatientInfo').style.display = 'none';
      document.getElementById('patientSearch').value = '';
    }

    async function confirmBooking() {
      if (!selectedPatientId) { Utils.showToast('Please select a patient first', 'warning'); return; }
      const scheduleId = document.getElementById('sessionSelect').value;
      if (!scheduleId) { Utils.showToast('Please select a session', 'warning'); return; }

      document.getElementById('confirmBookBtn').disabled = true;
      try {
        const res = await API.post('/appointments/offline-book/', {
          patient_id: selectedPatientId,
          schedule_id: scheduleId
        });
        if (res.success) {
          closeBookingModal();
          const d = res.data;
          document.getElementById('confirmApptNum').innerText = `#${d.appointment_number}`;
          document.getElementById('confirmDetails').innerHTML =
            `<strong>${d.patient_name}</strong><br>
             Dr. ${d.doctor_name}<br>
             ${d.schedule_title}<br>
             ${d.schedule_date} at ${d.schedule_time}`;
          document.getElementById('confirmModal').classList.add('active');
          loadAppointments();
        }
      } catch (err) {
        Utils.showToast(err.message || 'Booking failed', 'danger');
      } finally {
        document.getElementById('confirmBookBtn').disabled = false;
      }
    }

    function closeConfirmModal() {
      document.getElementById('confirmModal').classList.remove('active');
    }

    loadAppointments();
  </script>
</body>
</html>
