<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPD Admissions - eDoc HMS</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

  <div class="layout-container">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <div class="content-wrapper">

        <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
          <div>
            <h2 class="font-bold">IPD Admissions</h2>
            <p class="text-muted mt-1">View and manage Inpatient Department admissions.</p>
          </div>
          <button class="btn btn-primary" onclick="openAdmissionModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:0.5rem"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Admission
          </button>
        </div>

        <!-- Filters -->
        <div class="flex gap-3 mb-5" style="flex-wrap:wrap;">
          <select id="filterStatus" class="form-input" style="max-width:180px;" onchange="loadAdmissions()">
            <option value="">All Statuses</option>
            <option value="admitted">Admitted (Active)</option>
            <option value="discharged">Discharged</option>
          </select>
          <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
        </div>

        <!-- Admissions Table -->
        <div class="card">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Appt # / ID</th>
                  <th>Patient</th>
                  <th>Attending Doctor</th>
                  <th>Bed / Room</th>
                  <th>Admission Date</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="apptBody">
                <tr><td colspan="6" class="text-center text-muted py-4">Loading admissions...</td></tr>
              </tbody>
            </table>
          </div>
          <div id="apptCount" class="text-xs text-muted mt-3 px-1"></div>
        </div>

      </div>
    </main>
  </div>

  <!-- New Admission Modal -->
  <div id="admissionModal" class="modal">
    <div class="modal-content" style="max-width:540px;">
      <div class="modal-header">
        <h4 class="font-bold">New IPD Admission</h4>
        <button class="btn btn-sm" onclick="closeAdmissionModal()">&times;</button>
      </div>
      <div class="modal-body">
        
        <!-- Step 1: Patient -->
        <div class="form-group mb-4">
          <label class="form-label" for="patientSearch">Select Patient (Search by name or email)</label>
          <input type="text" id="patientSearch" class="form-input" placeholder="Start typing..." oninput="searchPatient()">
          <div id="patientResults" style="max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);display:none;"></div>
          <div id="selectedPatientInfo" class="mt-2 text-sm font-bold text-primary" style="display:none;"></div>
        </div>

        <!-- Step 2: Doctor -->
        <div class="form-group mb-4">
          <label class="form-label" for="doctorSelect">Attending Doctor</label>
          <select id="doctorSelect" class="form-input">
            <option value="">Loading doctors...</option>
          </select>
        </div>

        <!-- Step 3: Bed -->
        <div class="form-group mb-4">
          <label class="form-label" for="bedSelect">Assign Bed</label>
          <select id="bedSelect" class="form-input">
            <option value="">Loading available beds...</option>
          </select>
        </div>

        <!-- Step 4: Details -->
        <div class="form-group mb-4">
          <label class="form-label" for="admDate">Admission Date & Time</label>
          <input type="datetime-local" id="admDate" class="form-input">
        </div>

        <div class="form-group mb-4">
          <label class="form-label" for="diagnosis">Initial Diagnosis / Reason</label>
          <input type="text" id="diagnosis" class="form-input" placeholder="e.g. Fever and dehydration">
        </div>

      </div>
      <div class="modal-footer flex justify-end" style="gap:.75rem;">
        <button type="button" class="btn btn-secondary" onclick="closeAdmissionModal()">Cancel</button>
        <button class="btn btn-primary" id="confirmAdmBtn" onclick="confirmAdmission()">Admit Patient</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    Auth.guard(['frontdesk']);

    const fdMenu = [
      { label: 'Dashboard', path: '../frontdesk/dashboard.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>' },
      { label: 'OPD Appointments', path: '../frontdesk/appointments.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' },
      { label: 'IPD Admissions', path: '../frontdesk/ipd.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h18"/><path d="M12 14v8"/><path d="M8 22h8"/><path d="M5 14V4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v10"/></svg>' },
      { label: 'Patient Search', path: '../frontdesk/patients.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' },
      { label: 'Billing Desk', path: '../frontdesk/billing.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>' },
      { label: 'My Profile', path: '../frontdesk/profile.html', iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' }
    ];

    Utils.renderSidebar(fdMenu, '../frontdesk/ipd.html', 'Front Desk', 'Registration Portal');
    Utils.renderHeader('IPD Admissions');

    let searchTimeout = null;
    let selectedPatientId = null;

    async function loadAdmissions() {
      const statusVal = document.getElementById('filterStatus').value;
      let query = '?';
      if (statusVal) query += `status=${statusVal}&`;

      try {
        const res = await API.get(`/ipd/admissions/${query}`);
        // ModelViewSet with pagination returns res.data.results
        const data = res.data.results || res.data || [];
        const count = res.data.count !== undefined ? res.data.count : data.length;
        document.getElementById('apptCount').innerText = `${count} admission(s) found.`;
        renderTable(data);
      } catch (err) {
        console.error(err);
        Utils.showToast('Failed to load admissions', 'danger');
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('apptBody');
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">No admissions found for the selected filters.</td></tr>`;
        return;
      }
      tbody.innerHTML = data.map(a => {
        const dateObj = new Date(a.admission_date);
        const formattedDate = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        return `
        <tr>
          <td><span class="badge badge-secondary">#ADM-${a.id}</span></td>
          <td><strong>${a.patient_name}</strong></td>
          <td>Dr. ${a.doctor_name || 'N/A'}</td>
          <td>${a.room_label ? 'Room ' + a.room_label : ''} ${a.bed_label ? '- Bed ' + a.bed_label : 'Unassigned'}</td>
          <td>${formattedDate}</td>
          <td><span class="badge ${a.status === 'admitted' ? 'badge-primary' : 'badge-success'}">${a.status.toUpperCase()}</span></td>
        </tr>`;
      }).join('');
    }

    function clearFilters() {
      document.getElementById('filterStatus').value = '';
      loadAdmissions();
    }

    // ── New Admission Modal ──────────────────────────────────────────────
    async function openAdmissionModal() {
      selectedPatientId = null;
      document.getElementById('patientSearch').value = '';
      document.getElementById('patientResults').innerHTML = '';
      document.getElementById('patientResults').style.display = 'none';
      document.getElementById('selectedPatientInfo').style.display = 'none';
      document.getElementById('diagnosis').value = '';
      
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('admDate').value = now.toISOString().slice(0,16);

      document.getElementById('admissionModal').classList.add('active');

      // Load doctors
      try {
        const dRes = await API.get('/doctors/');
        const docs = dRes.data.results || dRes.data || [];
        document.getElementById('doctorSelect').innerHTML = '<option value="">Select Doctor...</option>' + 
          docs.map(d => `<option value="${d.id}">Dr. ${d.user.name}</option>`).join('');
      } catch (e) {
        document.getElementById('doctorSelect').innerHTML = '<option value="">Failed to load</option>';
      }

      // Load beds
      try {
        const bRes = await API.get('/rooms_beds/beds/?status=available');
        const beds = bRes.data.results || bRes.data || [];
        document.getElementById('bedSelect').innerHTML = '<option value="">Select Bed...</option>' + 
          beds.map(b => `<option value="${b.id}">${b.bed_number} (Room ${b.room})</option>`).join('');
      } catch (e) {
        document.getElementById('bedSelect').innerHTML = '<option value="">Failed to load</option>';
      }
    }

    function closeAdmissionModal() {
      document.getElementById('admissionModal').classList.remove('active');
    }

    let patSearchTimeout = null;
    function searchPatient() {
      clearTimeout(patSearchTimeout);
      patSearchTimeout = setTimeout(async () => {
        const q = document.getElementById('patientSearch').value.trim();
        const resultsEl = document.getElementById('patientResults');
        if (q.length < 2) { 
          resultsEl.style.display = 'none';
          resultsEl.innerHTML = ''; 
          return; 
        }
        try {
          const res = await API.get(`/patients/?search=${encodeURIComponent(q)}`);
          const patients = res.data.results || res.data || [];
          if (patients.length === 0) {
            resultsEl.style.display = 'block';
            resultsEl.innerHTML = `<div style="padding:.5rem;color:var(--text-muted);font-size:.875rem;">No patients found.</div>`;
            return;
          }
          resultsEl.style.display = 'block';
          resultsEl.innerHTML = patients.map(p => `
            <div onclick="selectPatient(${p.id}, '${p.name}')"
                 style="padding:.5rem;cursor:pointer;border-bottom:1px solid var(--border);"
                 onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background=''">
              <strong>${p.name}</strong> <span class="text-xs text-muted">(${p.email || 'No email'})</span>
            </div>`).join('');
        } catch (err) {
          console.error(err);
        }
      }, 300);
    }

    function selectPatient(id, name) {
      selectedPatientId = id;
      document.getElementById('patientSearch').value = '';
      document.getElementById('patientResults').style.display = 'none';
      const infoEl = document.getElementById('selectedPatientInfo');
      infoEl.style.display = 'block';
      infoEl.innerText = `Selected Patient: ${name}`;
    }

    async function confirmAdmission() {
      if (!selectedPatientId) { Utils.showToast('Please select a patient', 'warning'); return; }
      const docId = document.getElementById('doctorSelect').value;
      const bedId = document.getElementById('bedSelect').value;
      const admDate = document.getElementById('admDate').value;
      const diag = document.getElementById('diagnosis').value;

      if (!docId || !bedId || !admDate || !diag) {
        Utils.showToast('Please fill all fields', 'warning'); 
        return;
      }

      document.getElementById('confirmAdmBtn').disabled = true;
      try {
        await API.post('/ipd/admissions/', {
          patient: selectedPatientId,
          attending_doctor: docId,
          bed: bedId,
          admission_date: admDate,
          diagnosis: diag,
          admission_notes: "Admitted via Frontdesk"
        });
        Utils.showToast('Admission created successfully!', 'success');
        closeAdmissionModal();
        loadAdmissions();
      } catch (err) {
        Utils.showToast(err.message || 'Failed to create admission', 'danger');
      } finally {
        document.getElementById('confirmAdmBtn').disabled = false;
      }
    }

    loadAdmissions();
  </script>
</body>
</html>
